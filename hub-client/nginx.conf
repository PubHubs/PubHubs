server {
    listen 8800;
    listen [::]:8800;

    root /usr/var/static/;

    # nginx's add_header is not additive across nested scopes — every location
    # block that sets any header must repeat the CSP header explicitly.

    # Default: img/, branding.css, robots.txt. No explicit Cache-Control;
    # the browser uses heuristic freshness with the ETag/Last-Modified for
    # revalidation. After a rebrand the logos may briefly be stale; accepted.
    location / {
        add_header Content-Security-Policy "${BAR_URL}" always;
    }

    # Vite-emitted chunks, CSS, fonts, wasm, SVG. Every filename here carries
    # a content hash, so a deploy produces new filenames; the old ones can
    # sit in cache forever.
    location /assets/ {
        add_header Content-Security-Policy "${BAR_URL}" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Entry HTML, runtime config, and the Yivi attributes list. The HTML
    # references content-hashed bundles that change every deploy;
    # client-config.js is rewritten by start.sh per container start;
    # yivi_attributes.json is not content-hashed but must reflect the
    # deployed list. All three must always revalidate.
    #
    # Must come before the entry-bundle regex below: /client-config.empty.js
    # also has the <name>.<hash>.js shape, and nginx picks the first matching
    # regex location.
    location ~ "^/[^/]+\.html$|^/client-config(\.empty)?\.js$|^/yivi/yivi_attributes\.json$" {
        add_header Content-Security-Policy "${BAR_URL}" always;
        add_header Cache-Control "no-cache" always;
    }

    # Entry bundles at the root: <name>.<hash>.js (e.g. index.D0YzC-5X.js,
    # miniclient.B1Y_Oadl.js). Vite places these at the root rather than
    # under /assets/ because of entryFileNames in vite.config.ts.
    location ~ "^/[^/.]+\.[A-Za-z0-9_-]+\.js$" {
        add_header Content-Security-Policy "${BAR_URL}" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}